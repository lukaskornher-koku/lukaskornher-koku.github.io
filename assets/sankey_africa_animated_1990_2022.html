var years = [1990, 1991, 1992, 1993, 1994, 1995, 1996, 1997, 1998, 1999, 2000, 2001, 2002, 2003, 2004, 2005, 2006, 2007, 2008, 2009, 2010, 2011, 2012, 2013, 2014, 2015, 2016, 2017, 2018, 2019, 2020, 2021, 2022];
var currentIdx = 0;
var playing = true;
var interval = null;
var SPEED = 2000;

document.getElementById("yearSlider").max = years.length - 1;

function numberWithCommas(x) {
  return x.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
}

function updateChart(idx) {
  currentIdx = idx;
  var yr = years[idx];
  var d = yearData[yr];

  document.getElementById("yearDisplay").innerText = yr;
  document.getElementById("yearSlider").value = idx;

  var netLabel = d.gvc_position >= 0 ? "GVC position: upstream (" + d.gvc_position.toFixed(3) + ")" : "GVC position: downstream (" + d.gvc_position.toFixed(3) + ")";

  document.getElementById("stats").innerHTML =
    '<span class="stat-back">&#9664; Backward: $' + numberWithCommas(d.backward_total) + 'M</span> &nbsp;|&nbsp;' +
    '<span class="stat-fwd">Forward: $' + numberWithCommas(d.forward_total) + 'M &#9654;</span> &nbsp;|&nbsp;' +
    '<span class="stat-net">' + netLabel + '</span> &nbsp;|&nbsp;' +
    '<span class="stat-intra">Intra-African: $' + numberWithCommas(d.intra) + 'M</span>';

  var trace = {
    type: "sankey",
    arrangement: "snap",
    node: {
      pad: 20,
      thickness: 25,
      line: { color: "black", width: 0.5 },
      label: d.labels,
      color: d.node_colors
    },
    link: {
      source: d.sources,
      target: d.targets,
      value: d.values,
      color: d.link_colors,
      label: d.link_labels
    }
  };

  var layout = {
    title: {
      text: "Africa: Forward & Backward VA Linkages (" + yr + ")<br>" +
            '<sup style="color:#d64541">&#9664; Red = Backward (foreign VA in Africa\'s exports)</sup>' +
            "<sup>  |  </sup>" +
            '<sup style="color:#2c6fbb">Blue = Forward (African VA in others\' exports) &#9654;</sup>',
      font: { size: 14 }
    },
    font: { size: 11 },
    margin: { t: 80, b: 20, l: 20, r: 20 }
  };

  Plotly.react("chart", [trace], layout);
}

function togglePlay() {
  playing = !playing;
  var btn = document.getElementById("playBtn");
  if (playing) {
    btn.innerHTML = "&#9646;&#9646; Pause";
    btn.classList.add("active");
    startLoop();
  } else {
    btn.innerHTML = "&#9654; Play";
    btn.classList.remove("active");
    clearInterval(interval);
  }
}

function stepYear(dir) {
  var newIdx = currentIdx + dir;
  if (newIdx < 0) newIdx = years.length - 1;
  if (newIdx >= years.length) newIdx = 0;
  updateChart(newIdx);
}

function sliderChange(val) {
  updateChart(parseInt(val));
}

function startLoop() {
  clearInterval(interval);
  interval = setInterval(function() {
    var nextIdx = currentIdx + 1;
    if (nextIdx >= years.length) nextIdx = 0;
    updateChart(nextIdx);
  }, SPEED);
}

// Initial render
updateChart(0);
if (playing) {
  document.getElementById("playBtn").innerHTML = "&#9646;&#9646; Pause";
  startLoop();
}
</script>
