<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Bessel Function Chart</title>\n    <script src=\"https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.6.0/chart.min.js\"></script>\n</head>\n<body>\n    <h1>Interactive Bessel Function Chart</h1>\n    <div>\n        <label><input type=\"checkbox\" value=\"0\"> Bessel Order 0</label>\n        <label><input type=\"checkbox\" value=\"1\"> Bessel Order 1</label>\n        <label><input type=\"checkbox\" value=\"2\"> Bessel Order 2</label>\n        <label><input type=\"checkbox\" value=\"3\"> Bessel Order 3</label>\n        <label><input type=\"checkbox\" value=\"4\"> Bessel Order 4</label>\n        <label><input type=\"checkbox\" value=\"5\"> Bessel Order 5</label>\n        <input type=\"range\" min=\"1\" max=\"20\" value=\"10\" id=\"frequency-slider\"> Frequency (1-20)\n    </div>\n    <canvas id=\"besselChart\"></canvas>\n    <script>\n        const ctx = document.getElementById('besselChart').getContext('2d');\n        const besselChart = new Chart(ctx, {\n            type: 'line',\n            data: {\n                labels: [],\n                datasets: []\n            },\n            options: {\n                responsive: true,\n                plugins: {\n                    legend: {\n                        display: true,\n                    }\n                }\n            }\n        });\n\n        function calculateBesselFunction(order, frequency) {\n            // Example calculation for Bessel function (replace with actual implementation)\n            return Array.from({length: 100}, (_, i) => Math.sin((i / 100) * Math.PI * frequency) * (order + 1));\n        }\n\n        function updateChart() {\n            const frequency = document.getElementById('frequency-slider').value;\n            const selectedOrders = Array.from(document.querySelectorAll('input[type=checkbox]:checked')).map(el => parseInt(el.value));\n            const datasets = selectedOrders.map(order => ({\n                label: 'Bessel Order ' + order,\n                data: calculateBesselFunction(order, frequency),\n                borderColor: 'hsl(' + (order * 50) + ', 100%, 50%)',\n                fill: false,\n                tension: 0.1\n            }));\n\n            besselChart.data.datasets = datasets;\n            besselChart.update();\n        }\n\n        document.querySelectorAll('input[type=checkbox]').forEach(checkbox => {\n            checkbox.addEventListener('change', updateChart);\n        });\n        document.getElementById('frequency-slider').addEventListener('input', updateChart);\n    </script>\n</body>\n</html>\n
